preprocessing:
  cwt_freq_max: 30
  cwt_freq_min: 1
  cwt_n_freqs: 30
  data_root: eeg_data/Data/NMT_Events
  img_height: 224
  img_width: 224
  min_windows_per_subject: 2
  mode: three_class
  normal_edf_duration: 600
  output_root: data
  window_duration: 2.0
  window_overlap: 0.5
training:
  batch_size: 32
  checkpoint_dir: checkpoints
  data:
    test_dir: data/test
    train_dir: data/train
    valid_dir: data/valid
  early_stopping:
    min_delta: 0.001
    patience: 5
  epochs: 1
  learning_rate: 0.0001
  mode: three_class
  model: vgg16
  num_classes: 3
