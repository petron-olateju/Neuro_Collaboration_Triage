# ─────────────────────────────────────────────────────────────────────────────
# Dataset Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Add as many datasets as needed under `datasets:`.
# The key (e.g. "nmt", "tuab") is the name you pass to DatasetLoader(dataset_name="nmt").
#
# Supported braindecode datasets and their valid target_name options:
#
#   nmt    → braindecode.datasets.NMT
#              targets: "pathological" | "gender" | "age"
#
#   tuab   → braindecode.datasets.TUHAbnormal
#              targets: "pathological" | "gender" | "age"
#
# Any extra keys beyond the standard ones (path, target_name, preload,
# recording_ids, n_jobs) are forwarded as **kwargs to the braindecode
# constructor, so you can pass dataset-specific arguments here too.
# ─────────────────────────────────────────────────────────────────────────────

datasets:

  nmt:
    braindecode_class: NMT                # maps to braindecode.datasets.NMT
    path: /path/to/nmt_dataset            # root folder of the downloaded dataset
    target_name: pathological             # "pathological" | "gender" | "age"
    preload: false                        # true = load all into RAM
    recording_ids: null                   # null = all; or e.g. [0, 1, 2, 3, 4]
    n_jobs: 1                             # parallel file-reading workers
    
  tuab:
    braindecode_class: TUHAbnormal        # maps to braindecode.datasets.TUHAbnormal
    path: /path/to/tuab_dataset
    target_name: pathological
    preload: false
    recording_ids: null
    n_jobs: 4
    # TUHAbnormal-specific extras forwarded as kwargs
    add_physician_reports: false